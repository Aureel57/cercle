function reducer(s,a){switch(a.type){
  case"LOGIN":return{...s,user:{...a.payload,refCode:a.payload.refCode||uid().toUpperCase().slice(0,6)}};

  case"TOG_FAV":{const f=new Set(s.favorites);f.has(a.id)?f.delete(a.id):f.add(a.id);return{...s,favorites:f}}
  case"BOOK":{
    const b=a.payload;
    const n={id:uid(),text:`Réservation : ${b.itemTitle}`,read:false,at:new Date()};
    const pay={id:uid(),bookingId:b.id,type:"payment",amount:b.total,status:"completed",method:b.payMethod||"card",date:new Date(),label:`Location : ${b.itemTitle}`};
    const dep={id:uid(),bookingId:b.id,type:"deposit",amount:b.deposit,status:"held",method:b.payMethod||"card",date:new Date(),label:`Caution : ${b.itemTitle}`,itemTitle:b.itemTitle,ownerId:b.ownerId,ownerName:b.ownerName,renterId:b.userId,renterName:s.user?.name||"Locataire"};
    return{...s,bookings:[...s.bookings,b],notifications:[n,...s.notifications],payments:[...s.payments,pay,dep]}}
  case"CANCEL_BOOK":return{...s,bookings:s.bookings.map(b=>b.id===a.id?{...b,status:"cancelled"}:b)};
  case"RELEASE_DEP":{
    const dep=s.payments.find(p=>p.id===a.id);
    const n=dep?{id:uid(),text:`Caution de ${dep.amount}€ restituée (${dep.itemTitle})`,read:false,at:new Date()}:null;
    return{...s,payments:s.payments.map(p=>p.id===a.id?{...p,status:"released",releasedAt:new Date()}:p),notifications:n?[n,...s.notifications]:s.notifications}}
  case"MSG":{const m=a.payload;let cs=[...s.conversations],cv=cs.find(c=>c.id===m.cid);
    if(!cv){cv={id:m.cid,parts:[m.from,m.to],itemId:m.itemId,last:m.text,at:new Date()};cs.push(cv)}else cs=cs.map(c=>c.id===m.cid?{...c,last:m.text,at:new Date()}:c);
    return{...s,messages:[...s.messages,m],conversations:cs}}
  case"READ_N":return{...s,notifications:s.notifications.map(n=>({...n,read:true}))};
  case"REVIEW":{const r=a.payload;const items=s.items.map(i=>i.id===r.itemId?{...i,reviews:i.reviews+1,rating:+((i.rating*i.reviews+r.rating)/(i.reviews+1)).toFixed(2)}:i);return{...s,reviews:[...s.reviews,r],items}}
  case"ADD_ITEM":{const it={...a.payload,id:uid(),owner:s.user,rating:0,reviews:0,createdAt:new Date().toISOString(),isPro:a.payload.isPro||false};const newUserItems=[...s.userItems,it];try{localStorage.setItem('cercle_items',JSON.stringify(newUserItems));}catch(e){}if(window.db&&s.user){window.db.collection('items').doc(it.id).set(it).catch(console.error);}return{...s,userItems:newUserItems,notifications:[{id:uid(),text:`"${it.title}" publiée !`,read:false,at:new Date()},...s.notifications]}}
  case"READ_ONE":return{...s,notifications:s.notifications.map(n=>n.id===a.id?{...n,read:true}:n)};
  case"REFERRAL":{const n={id:uid(),text:`${a.name} a rejoint Cercle ! +5€`,read:false,at:new Date(),kind:"referral"};return{...s,referrals:[...s.referrals,{id:uid(),name:a.name,date:new Date(),bonus:5}],notifications:[n,...s.notifications]}}
  case"DISPUTE":return{...s,disputes:[...s.disputes,a.payload],notifications:[{id:uid(),text:"Litige ouvert",read:false,at:new Date(),kind:"dispute"},...s.notifications]};
  case"RESOLVE_DISPUTE":return{...s,disputes:s.disputes.map(d=>d.id===a.id?{...d,status:"resolved"}:d)};
  case"VERIFY_ID":return{...s,user:{...s.user,verified:true},notifications:[{id:uid(),text:"Identité vérifiée ✓",read:false,at:new Date(),kind:"system"},...s.notifications]};
  case"ADD_WALLET":return{...s,wallet:s.wallet+(a.amount||0),notifications:[{id:uid(),text:`+${a.amount}€ ajoutés au wallet`,read:false,at:new Date(),kind:"wallet"},...s.notifications]};

.mcbd{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:8px}.bub{max-width:70%;padding:11px 16px;border-radius:20px;font-size:13px;line-height:1.5}.bub.me{background:linear-gradient(135deg,var(--p),#FF8A5C);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 2px 8px rgba(108,99,255,.2)}.bub.th{background:var(--w);color:var(--dk);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.06)}.bub .bt{font-size:10px;opacity:.5;margin-top:4px;display:block}

.smbg{position:fixed;inset:0;background:rgba(0,0,0,.15);backdrop-filter:blur(4px);z-index:140}.sm{position:fixed;top:0;left:0;right:0;background:var(--w);z-index:150;box-shadow:var(--shl);border-bottom-left-radius:var(--rl);border-bottom-right-radius:var(--rl);animation:sd .2s var(--ease)}@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1}}
.smin{max-width:760px;margin:0 auto;padding:20px 28px 28px}.smr{display:flex;background:var(--bg);border-radius:40px;padding:4px;align-items:center;border:1px solid var(--bd)}.smf{flex:1;padding:12px 20px;border-radius:32px;cursor:pointer;transition:all .2s var(--ease)}.smf:hover,.smf.on{background:var(--w);box-shadow:var(--shm)}.smf label{font-size:9px;font-weight:700;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;color:var(--g)}.smf input{border:none;background:none;font-size:13px;color:var(--dk);outline:none;width:100%;font-weight:500}

.dark{--p:#7c74ff;--pd:#6a63f0;--acc:#4FD1C5;--dk:#f1f1f5;--tx:#e0e0f0;--g:#a0a0b8;--gl:#7070a0;--bd:#2d2d3d;--bg:#0f0f13;--bgw:#1a1a24;--w:#1e1e2e;--sh:0 2px 8px rgba(0,0,0,.5);--shm:0 2px 16px rgba(0,0,0,.55);--shl:0 8px 32px rgba(0,0,0,.65),0 2px 8px rgba(0,0,0,.45)}

.dark .fg input:focus,.dark .fg textarea:focus{border-color:rgba(255,255,255,.4);box-shadow:0 0 0 3px rgba(255,255,255,.06)}
.dark .dd{border-color:rgba(255,255,255,.08);background:#1A1A1A}
.dark .di:hover{background:#242424}

function Carousel({images,onClick}){const[c,setC]=useState(0);return <div className="ciw"><img className="cimg" src={images[c]} alt="" loading="lazy" onClick={onClick}/>{images.length>1&&<><button className="nav l" onClick={e=>{e.stopPropagation();setC(x=>(x-1+images.length)%images.length)}}><I.Chv d="l"/></button><button className="nav r" onClick={e=>{e.stopPropagation();setC(x=>(x+1)%images.length)}}><I.Chv d="r"/></button><div className="dts">{images.map((_,i)=><div key={i} className={"dt"+(i===c?" on":"")}/>)}</div></>}</div>}

function Card({item,onOpen,favs,dispatch,onAuthRequired}){return <div className={"card"+(item.isPro?" pro-card":"")} onClick={()=>onOpen(item)}>
  <Carousel images={item.images} onClick={()=>onOpen(item)}/>
  <button className="cfav" onClick={e=>{e.stopPropagation();if(onAuthRequired){onAuthRequired();return;}dispatch({type:"TOG_FAV",id:item.id})}}><I.Heart f={favs.has(item.id)}/></button>
  {item.isPro&&<div className="pro-badge">PRO</div>}
  {item.owner?.verified&&<div className="cbdg">✓</div>}
  <div className="card-cta">Voir l'annonce →</div>
  <div className="cbo">
    <div className="cbt"><span className="cbn">{item.title}</span><span className="cbr">⭐ {item.rating}</span></div>
    <div className="cbl">📍 {item.location}</div>
    <div className="cbp-row">
      <div className="cbp">{item.price} €<span> / jour</span></div>
      <span className="cond-badge">{item.condition}</span>
    </div>
  </div>
</div>}

function CGUModal({onClose}){
  return <div className="bk" onClick={onClose}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>

      <h3 style={{fontWeight:700,marginBottom:6,marginTop:16}}>1. Objet</h3>
      <p>Cercle est une plateforme de mise en relation entre particuliers et professionnels pour la location d'objets. Les présentes CGU régissent l'utilisation du service accessible sur cercle.fr.</p>
      <h3 style={{fontWeight:700,marginBottom:6,marginTop:16}}>2. Inscription et compte</h3>
      <p>L'inscription est gratuite. L'utilisateur s'engage à fournir des informations exactes, sincères et à jour. Il est responsable de la confidentialité de ses identifiants. Cercle se réserve le droit de suspendre ou supprimer tout compte en cas de violation des présentes CGU, d'abus ou de comportement frauduleux.</p>

      <p>Les annonces doivent décrire fidèlement les objets proposés. Sont interdits : les objets illégaux, dangereux, contrefaits ou soumis à réglementation spéciale. Le propriétaire fixe librement son prix journalier. Toute réservation acceptée constitue un engagement contractuel entre les deux parties.</p>
      <h3 style={{fontWeight:700,marginBottom:6,marginTop:16}}>4. Paiements et commissions</h3>
      <p>Cercle perçoit une commission sur chaque transaction selon le grade de l'utilisateur (de 3% pour les Fondateurs Cercle à 12% pour les Voisins). Les paiements sont sécurisés SSL. La caution est bloquée pendant la location et restituée sous 48h après confirmation de retour en bon état.</p>
      <h3 style={{fontWeight:700,marginBottom:6,marginTop:16}}>5. Responsabilités</h3>
      <p>Cercle est une plateforme d'intermédiation et n'est pas partie aux contrats de location. Une protection jusqu'à 2 000 € est incluse pour les objets loués via Cercle. En cas de litige, Cercle peut intervenir en médiateur sans obligation de résultat.</p>
      <h3 style={{fontWeight:700,marginBottom:6,marginTop:16}}>6. Résiliation</h3>
      <p>L'utilisateur peut supprimer son compte à tout moment depuis les paramètres. Cercle peut résilier un compte sans préavis en cas de violation grave des présentes CGU.</p>
      <h3 style={{fontWeight:700,marginBottom:6,marginTop:16}}>7. Contact</h3>
      <p>Pour toute question relative aux CGU : <a href="mailto:support@cercle.fr" style={{color:'var(--p)'}}>support@cercle.fr</a></p>
      <button className="bp" style={{width:'100%',marginTop:24}} onClick={onClose}>J'ai lu et compris ✓</button>
    </div>
  </div></div>
}

function AuthModal({onClose,dispatch,mode:im}){
  const[mode,setMode]=useState(im||"login");const[step,setStep]=useState(0);const[acctType,setAcctType]=useState("perso");
  const[f,setF]=useState({firstName:"",lastName:"",dobDay:"",dobMonth:"",dobYear:"",email:"",password:"",city:"",address:"",postalCode:"",phone:"",bio:"",company:"",siret:"",sector:"",tva:"",website:""});
  const[avatarPreview,setAvatarPreview]=useState(null);
  const[addrSugg,setAddrSugg]=useState([]);const addrTimer=React.useRef(null);
  const[cguOk,setCguOk]=useState(false);const[privacyOk,setPrivacyOk]=useState(false);const[marketingOk,setMarketingOk]=useState(false);
  const[showCGU,setShowCGU]=useState(false);const[showPrivacy,setShowPrivacy]=useState(false);
  const[err,setErr]=useState("");const[loading,setLoading]=useState("");
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const go=()=>{
    if(mode==="login"){
      if(!f.email||!f.password){setErr("Remplissez tous les champs");return}
      // Essai demo users d'abord
      const demo=USERS.find(u=>u.email===f.email&&u.password===f.password)||PRO_USERS.find(u=>u.email===f.email&&u.password===f.password);
      if(demo){dispatch({type:"LOGIN",payload:demo});onClose();return}
      // Sinon Firebase Auth ou fallback localStorage
      if(!window.auth){
        // Fallback : vérifier le compte dans localStorage
        try{
          const saved=localStorage.getItem('cercle_user_'+f.email.toLowerCase());
          if(saved){
            const u=JSON.parse(saved);
            if(u._pwd===f.password){
              const {_pwd,...profile}=u;
              dispatch({type:"LOGIN",payload:profile});onClose();
            }else{setErr("Mot de passe incorrect");}
          }else{setErr("Aucun compte trouvé avec cet email. Inscris-toi d'abord.");}
        }catch(e){setErr("Erreur de connexion");}
        return;
      }
      setLoading("login");setErr("");
      window.auth.signInWithEmailAndPassword(f.email,f.password)
        .then(cred=>window.db?window.db.collection('users').doc(cred.user.uid).get():Promise.resolve(null))
        .then(doc=>{
          if(doc&&doc.exists){dispatch({type:"LOGIN",payload:doc.data()});}
          else{
            try{const saved=localStorage.getItem('cercle_user_'+f.email.toLowerCase());if(saved){const {_pwd,...p}=JSON.parse(saved);dispatch({type:"LOGIN",payload:p});}}catch(e){}
          }
          setLoading("");onClose();
        })
        .catch(e=>{
          setLoading("");
          if(e.code==="auth/wrong-password"||e.code==="auth/user-not-found"||e.code==="auth/invalid-credential")setErr("Email ou mot de passe incorrect");
          else setErr("Erreur de connexion");
        });
    }else{
      if(step===0)return setStep(1);
      if(acctType==="perso"){
        if(!f.firstName||!f.lastName||!f.email||!f.password){setErr("Remplissez tous les champs obligatoires");return}
        if(!cguOk||!privacyOk){setErr("Veuillez accepter les CGU et la Politique de confidentialité");return}
        const dob=f.dobDay&&f.dobMonth&&f.dobYear?`${f.dobDay}/${f.dobMonth}/${f.dobYear}`:"";
        const userData={name:`${f.firstName} ${f.lastName}`,email:f.email,avatar:"😊",verified:false,since:new Date().getFullYear(),bio:f.bio||"",location:f.city||"",city:f.city,address:f.address,postalCode:f.postalCode,phone:f.phone,dob,marketingEmails:marketingOk,avatarUrl:avatarPreview||null,rating:0,rentals:0,responseTime:"~1h",isPro:false};
        if(window.auth){
          setLoading("register");setErr("");
          window.auth.createUserWithEmailAndPassword(f.email,f.password)
            .then(cred=>{
              const u={...userData,id:cred.user.uid};
              if(window.db)window.db.collection('users').doc(cred.user.uid).set(u).catch(()=>{});
              try{localStorage.setItem('cercle_user_'+f.email,JSON.stringify(u));}catch(e){}
              dispatch({type:"LOGIN",payload:u});setLoading("");onClose();
            })
            .catch(e=>{
              setLoading("");
              if(e.code==="auth/email-already-in-use")setErr("Cet email est déjà utilisé. Connecte-toi.");
              else if(e.code==="auth/weak-password")setErr("Mot de passe trop court (6 caractères minimum)");

            });
        }else{
          // Fallback localStorage : vérifier si email déjà utilisé
          const existing=localStorage.getItem('cercle_user_'+f.email.toLowerCase());

          const newUser={...userData,id:uid()};

        }
      }else{

        const userData={name:f.company,email:f.email,avatar:"🏢",verified:true,since:new Date().getFullYear(),bio:f.sector?`Secteur : ${f.sector}`:"Professionnel",location:f.city||"",rating:0,rentals:0,responseTime:"~15 min",isPro:true,company:f.company,siret:f.siret,tva:f.tva,phone:f.phone,website:f.website,sector:f.sector};
        if(window.auth){
          setLoading("register");setErr("");
          window.auth.createUserWithEmailAndPassword(f.email,f.password)
            .then(cred=>{
              const u={...userData,id:cred.user.uid};
              if(window.db)window.db.collection('users').doc(cred.user.uid).set(u).catch(()=>{});
              try{localStorage.setItem('cercle_user_'+f.email,JSON.stringify(u));}catch(e){}
              dispatch({type:"LOGIN",payload:u});setLoading("");onClose();
            })
            .catch(e=>{
              setLoading("");
              if(e.code==="auth/email-already-in-use")setErr("Cet email est déjà utilisé. Connecte-toi.");
              else setErr("Erreur lors de la création du compte");
            });
        }else{
          const existing=localStorage.getItem('cercle_user_'+f.email.toLowerCase());
          if(existing){setErr("Cet email est déjà utilisé. Connecte-toi.");return;}
          const newUser={...userData,id:uid()};
          try{localStorage.setItem('cercle_user_'+f.email.toLowerCase(),JSON.stringify({...newUser,_pwd:f.password}));}catch(e){}
          dispatch({type:"LOGIN",payload:newUser});onClose();
        }
      }
    }

/* ===== ONBOARDING ===== */
function Onboarding({onClose}){
  const[step,setStep]=useState(0);
  const steps=[
    {icon:"🎉",title:"Bienvenue sur Cercle !",desc:"La plateforme de location entre particuliers et pros. Louez ce dont vous avez besoin, rentabilisez ce que vous n'utilisez pas."},
    {icon:"🔍",title:"Trouvez facilement",desc:"2 400+ annonces disponibles. Filtrez par catégorie, localisation et prix. Réservez en quelques clics, depuis n'importe où."},
    {icon:"💰",title:"Rentabilisez vos objets",desc:"Proposez vos affaires inutilisées en 2 minutes. Définissez votre prix et vos disponibilités, les demandes arrivent directement."},
    {icon:"🛡️",title:"Louer en toute sécurité",desc:"Paiement sécurisé SSL, caution automatique et protection jusqu'à 2 000 €. Vous êtes protégé à chaque location."},

        <p style={{fontSize:14,color:"var(--g)",lineHeight:1.65,maxWidth:340,margin:"0 auto"}}>{s.desc}</p>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:20,marginTop:8}}>
        {steps.map((_,i)=><div key={i} style={{width:i===step?24:6,height:6,borderRadius:3,background:i===step?"var(--p)":"var(--bd)",transition:"all .3s var(--ease)"}}/>)}
      </div>
      <div style={{padding:"0 24px 28px",display:"flex",gap:8}}>
        {step===0
          ?<button className="bs" style={{flex:1}} onClick={onClose}>Passer</button>
          :<button className="bs" style={{flex:1}} onClick={()=>setStep(s=>s-1)}>← Retour</button>}
        {step<steps.length-1
          ?<button className="bp" style={{flex:2}} onClick={()=>setStep(s=>s+1)}>Suivant →</button>
          :<button className="bp" style={{flex:2,background:"var(--acc)"}} onClick={onClose}>C'est parti 🚀</button>}
      </div>
    </div>
  </div>
}

/* ===== QR CODE MODAL ===== */
function QRModal({item,onClose}){
  const qrRef=useRef(null);
  const baseUrl=window.location.href.split('?')[0];
  const url=`${baseUrl}?annonce=${item.id}&action=confirm`;
  useEffect(()=>{
    if(qrRef.current&&window.QRCode){
      qrRef.current.innerHTML='';
      new QRCode(qrRef.current,{text:url,width:200,height:200,colorDark:"#6C63FF",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
    }
  },[]);
  const download=()=>{
    const canvas=qrRef.current?.querySelector('canvas');
    if(canvas){const a=document.createElement('a');a.download=`qrcode-${item.title.replace(/\s+/g,'-')}.png`;a.href=canvas.toDataURL('image/png');a.click();}
  };
  return <div className="bk" onClick={onClose}>
    <div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:420,textAlign:'center'}}>
      <div className="mh"><button className="mx" onClick={onClose}><I.X/></button><h2>📱 QR Code anti-litige</h2></div>
      <div className="mb" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <div style={{fontSize:15,fontWeight:700,color:'var(--dk)',maxWidth:280,lineHeight:1.4}}>{item.title}</div>
        <div ref={qrRef} style={{width:200,height:200,display:'flex',alignItems:'center',justifyContent:'center'}}/>
        <div style={{fontSize:13,color:'var(--tx)',lineHeight:1.65,textAlign:'left',background:'#fef9c3',borderRadius:12,padding:'14px 16px',border:'1px solid #fde68a',margin:0,width:'100%'}}>
          📌 Collez ce QR code sur votre objet. Lors de la remise, le locataire devra scanner ce code pour confirmer qu'il a bien reçu l'objet. Au retour, vous devrez scanner ce code pour confirmer la récupération. Cela protège les deux parties en cas de litige.
        </div>
        <button className="bp" style={{width:'100%'}} onClick={download}>⬇️ Télécharger le QR code</button>
        <button className="bs" style={{width:'100%'}} onClick={onClose}>Fermer</button>
      </div>
    </div>
  </div>
}

/* ===== MINI CALENDAR ===== */
function MiniCal({value,onChange,label,minDate}){
  const d=value?new Date(value):new Date();
  const[viewY,setViewY]=useState(d.getFullYear());const[viewM,setViewM]=useState(d.getMonth());
  const months=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  const days=["Lu","Ma","Me","Je","Ve","Sa","Di"];
  const firstDay=new Date(viewY,viewM,1).getDay()||7;
  const daysInMonth=new Date(viewY,viewM+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const minD=minDate?new Date(minDate):today;minD.setHours(0,0,0,0);
  const prev=()=>{if(viewM===0){setViewM(11);setViewY(viewY-1)}else setViewM(viewM-1)};
  const next=()=>{if(viewM===11){setViewM(0);setViewY(viewY+1)}else setViewM(viewM+1)};
  const selDate=value?new Date(value):null;if(selDate)selDate.setHours(0,0,0,0);
  const cells=[];for(let i=1;i<firstDay;i++)cells.push(null);for(let i=1;i<=daysInMonth;i++)cells.push(i);
  return <div style={{background:"var(--w)",borderRadius:12,border:"1.5px solid var(--bd)",overflow:"hidden"}}>
    <div style={{padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--bgw)"}}>
      <button style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"2px 8px",borderRadius:6}} onClick={prev}>‹</button>
      <span style={{fontSize:13,fontWeight:700,fontFamily:"var(--fd)"}}>{months[viewM]} {viewY}</span>
      <button style={{background:"none",border:"none",fontSize:16,cursor:"pointer",padding:"2px 8px",borderRadius:6}} onClick={next}>›</button>
    </div>
    <div style={{padding:"6px 8px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{days.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"var(--gl)",padding:2}}>{d}</div>)}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((day,i)=>{if(!day)return <div key={i}/>;
          const dt=new Date(viewY,viewM,day);dt.setHours(0,0,0,0);
          const isPast=dt<minD;const isSel=selDate&&dt.getTime()===selDate.getTime();const isToday=dt.getTime()===today.getTime();
          return <button key={i} disabled={isPast} onClick={()=>{const m=String(viewM+1).padStart(2,"0");const dd=String(day).padStart(2,"0");onChange(`${viewY}-${m}-${dd}`)}}
            style={{width:"100%",aspectRatio:"1",border:"none",borderRadius:8,fontSize:12,fontWeight:isSel?700:isToday?600:400,
              background:isSel?"var(--p)":isToday?"var(--bgw)":"transparent",color:isSel?"#fff":isPast?"var(--gl)":"var(--dk)",
              cursor:isPast?"default":"pointer",transition:"all .1s"}}>
            {day}
          </button>
        })}
      </div>
    </div>
    {label&&<div style={{padding:"6px 12px",borderTop:"1px solid var(--bd)",fontSize:11,color:"var(--g)",textAlign:"center"}}>{label}: <strong>{value||"—"}</strong></div>}
  </div>
}

];
function getGrade(rentals) { return GRADES.find(g => rentals >= g.min && rentals <= g.max) || GRADES[0]; }
function getNextGrade(rentals) { const i = GRADES.findIndex(g => rentals >= g.min && rentals <= g.max); return i < GRADES.length - 1 ? GRADES[i + 1] : null; }
function getDivision(rentals) {
  const g = getGrade(rentals);
  const div = g.divs.find(d => rentals >= d.min && rentals <= d.max) || g.divs[0];
  const nextDiv = g.divs[g.divs.findIndex(d => rentals >= d.min && rentals <= d.max) + 1] || null;
  const prog = nextDiv ? Math.min(100, Math.round(((rentals - div.min) / (nextDiv.min - div.min)) * 100)) : 100;
  return { div, nextDiv, prog };
}
function calcSavings(rentals, avgPrice) {
  const base = GRADES[0].feeRate;
  const current = getGrade(rentals).feeRate;
  return Math.floor(rentals * avgPrice * 3 * (base - current));
}

function CreateListing({state,dispatch,setPage,mode}){
  const[f,setF]=useState({title:"",cat:"tools",price:"",location:state.user?.location||"Paris 11e",condition:"Comme neuf",description:"",deposit:""});
  const[photos,setPhotos]=useState([]);
  const[drag,setDrag]=useState(false);
  const fileRef=useRef(null);
  const camRef=useRef(null);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  const addPhotos=(files)=>{
    const remaining=5-photos.length;
    Array.from(files).slice(0,remaining).forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>setPhotos(p=>[...p,ev.target.result]);
      reader.readAsDataURL(file);
    });
  };

  const go=()=>{
    if(!f.title||!f.price)return;
    const imgs=photos.length>0?photos:[mkImg(f.cat,99,0),mkImg(f.cat,99,1),mkImg(f.cat,99,2)];
    dispatch({type:"ADD_ITEM",payload:{...f,price:+f.price,deposit:+f.deposit||+f.price*3,photos,images:imgs,isPro:!!state.user?.isPro}});
    setPage("profile");
  };

  return <div style={{maxWidth:540,margin:"0 auto",padding:28}}>
    <button className="cl" style={{marginBottom:14,display:"flex",alignItems:"center",gap:5}} onClick={()=>setPage("profile")}><I.Back/> Retour</button>
    <h1 style={{fontFamily:"var(--fd)",fontSize:22,marginBottom:18}}>Créer une annonce</h1>
    <div className="fg"><label>Titre *</label><input value={f.title} onChange={e=>u("title",e.target.value)} placeholder="Ex: Perceuse Bosch Pro"/></div>
    <div className="fg"><label>Catégorie</label><select value={f.cat} onChange={e=>u("cat",e.target.value)}>{CATS.filter(c=>c.id!=="all").map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <div className="fg"><label>Prix/jour (€) *</label><input type="number" value={f.price} onChange={e=>u("price",e.target.value)} placeholder="15"/></div>
      <div className="fg"><label>Caution (€)</label><input type="number" value={f.deposit} onChange={e=>u("deposit",e.target.value)} placeholder="Auto"/></div>
    </div>
    <div className="fg"><label>État</label><select value={f.condition} onChange={e=>u("condition",e.target.value)}><option>Comme neuf</option><option>Très bon état</option><option>Bon état</option></select></div>
    <div className="fg"><label>Ville</label><input value={f.location} onChange={e=>u("location",e.target.value)}/></div>
    <div className="fg"><label>Description</label><textarea value={f.description} onChange={e=>u("description",e.target.value)} placeholder="Décrivez votre objet..." rows={3}/></div>

    <div className="fg">
      <label>Photos {photos.length>0&&`(${photos.length}/5)`}</label>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{addPhotos(e.target.files);e.target.value=""}}/>
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{addPhotos(e.target.files);e.target.value=""}}/>

      {photos.length<5&&<div
        className={"photo-drop"+(drag?" drag":"")}
        onDrop={e=>{e.preventDefault();setDrag(false);addPhotos(e.dataTransfer.files)}}
        onDragOver={e=>{e.preventDefault();setDrag(true)}}
        onDragLeave={()=>setDrag(false)}
        onClick={()=>fileRef.current&&fileRef.current.click()}
      >
        <span style={{fontSize:28}}>🖼️</span>
        <p style={{fontSize:13,fontWeight:600,color:"var(--p)",margin:"8px 0 4px"}}>Glissez vos photos ici ou cliquez pour sélectionner</p>
        <p style={{fontSize:11,color:"var(--g)"}}>JPEG, PNG · max 5 photos</p>
        <button className="bs" style={{marginTop:10,fontSize:12,padding:"6px 14px",display:"inline-flex",alignItems:"center",gap:5}} onClick={e=>{e.stopPropagation();camRef.current&&camRef.current.click()}}>📷 Prendre une photo</button>
      </div>}

      {photos.length>0&&<div className="photo-thumbs">
        {photos.map((src,i)=><div key={i} className="photo-thumb">
          <img src={src} alt=""/>
          <button className="photo-thumb-del" onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))}>✕</button>
        </div>)}
        {photos.length<5&&<div style={{width:80,height:80,border:"2px dashed var(--bd)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:24,color:"var(--g)"}} onClick={()=>fileRef.current&&fileRef.current.click()}>+</div>}
      </div>}
    </div>

    <button className="bp" style={{width:"100%"}} onClick={go}>Publier l'annonce</button>
  </div>
}

function Messages({state,dispatch,cid,setCid,setPage}){
  const[msg,setMsg]=useState("");const ref=useRef(null);const[typing,setTyping]=useState(false);const[seen,setSeen]=useState({});
  const convs=state.conversations.sort((a,b)=>new Date(b.at)-new Date(a.at));
  const ac=convs.find(c=>c.id===cid);
  const msgs=state.messages.filter(m=>m.cid===cid).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight)},[msgs.length]);
  const send=()=>{if(!msg.trim()||!ac)return;const other=ac.parts.find(p=>p!==state.user.id);dispatch({type:"MSG",payload:{id:uid(),cid,from:state.user.id,to:other,text:msg.trim(),timestamp:new Date()}});setMsg("");
    setTyping(true);setTimeout(()=>{setTyping(false);const reps=["Bonjour ! Oui c'est disponible 😊","Bien sûr, on s'arrange.","Super, quand voulez-vous le récupérer ?","Envoyez-moi une demande !","Merci pour votre intérêt !"];dispatch({type:"MSG",payload:{id:uid(),cid,from:other,to:state.user.id,text:reps[Math.floor(Math.random()*reps.length)],timestamp:new Date()}})},1200+Math.random()*2e3)};
  const getO=cv=>{const oid=cv.parts.find(p=>p!==state.user?.id);return USERS.find(u=>u.id===oid)||{name:"Utilisateur",avatar:"😊"}};
  return <div style={{height:"100vh",display:"flex",flexDirection:"column"}}><div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:"1px solid var(--bd)",background:"var(--w)",flexShrink:0}}>
    <button className="mx" style={{position:"static"}} onClick={()=>setPage("home")}><I.Back/></button>
    <a className="logo" onClick={()=>setPage("home")} style={{textDecoration:'none'}}><svg viewBox="0 0 400 200" width="100" height="36" xmlns="http://www.w3.org/2000/svg"><circle cx="75" cy="100" r="50" fill="none" stroke="#6C63FF" strokeWidth="3.5"/><circle cx="115" cy="100" r="50" fill="none" stroke="#6C63FF" strokeWidth="3.5"/><path d="M95 58 A50 50 0 0 1 95 142 A50 50 0 0 1 95 58Z" fill="#6C63FF" opacity=".15"/><text x="265" y="111" textAnchor="middle" fontFamily="Georgia,serif" fontSize="44" fontWeight="400" fill="#6C63FF" letterSpacing="3">Cercle</text></svg></a>
    <span style={{fontSize:15,fontWeight:600,fontFamily:"var(--fd)",marginLeft:8}}>Messages</span>
  </div><div className="ml"><div className="mls"><div style={{padding:14,fontFamily:"var(--fd)",fontSize:16,fontWeight:600,borderBottom:"1px solid var(--bd)"}}>Messages</div>{convs.length===0?<div style={{padding:18,textAlign:"center",color:"var(--g)",fontSize:12}}>Aucune conversation</div>:convs.map(c=>{const o=getO(c);return <div key={c.id} className={"mc"+(cid===c.id?" on":"")} onClick={()=>setCid(c.id)}><div className="mca" style={{position:"relative"}}>{o.avatar}<span className="online-dot"/></div><div className="mci"><div className="mcn">{o.name}</div><div className="mcl">{c.last}</div></div></div>})}</div>
  <div className="mch">{!ac?<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--g)"}}><div style={{textAlign:"center"}}><span style={{fontSize:36,display:"block",marginBottom:6}}>💬</span>Sélectionnez une conversation</div></div>:<><div className="mchd"><span style={{fontSize:20}}>{getO(ac).avatar}</span>{getO(ac).name}</div><div className="mcbd" ref={ref}>{msgs.map(m=><div key={m.id} className={"bub"+(m.from===state.user?.id?" me":" th")}>{m.text}<span className="bt">{new Date(m.timestamp).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}{m.from===state.user?.id&&" ✓✓"}</span></div>)}{typing&&<div className="typing"><span/><span/><span/></div>}</div><div className="mip"><input value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Écrire un message..." onKeyDown={e=>e.key==="Enter"&&send()}/><button onClick={send}><I.Send/></button></div></>}</div></div></div>
}

/* ===== MAP PAGE ===== */
function MapPage({items,onOpen}){
  const[mapCat,setMapCat]=useState('all');
  const[areaItems,setAreaItems]=useState([]);
  const[drawerOpen,setDrawerOpen]=useState(false);
  const[sel,setSel]=useState(null);
  const mapRef=useRef(null);
  const leafRef=useRef(null);
  const mgRef=useRef(null);
  const rebuildRef=useRef(null);
  const mapCatRef=useRef('all');
  const itemsRef=useRef(items);
  // Always keep itemsRef in sync without triggering effects
  itemsRef.current=items;

  /* ---- helpers ---- */
  const filterByBounds=(map,src)=>{
    try{
      const b=map.getBounds();
      if(!b||!b.isValid())return src;
      return src.filter(i=>typeof i.lat==='number'&&typeof i.lng==='number'&&b.contains([i.lat,i.lng]));
    }catch{return src;}
  };

  const buildMarkers=(map,mg,src)=>{
    mg.clearLayers();
    const cities={};
    src.forEach(i=>{
      if(typeof i.lat!=='number'||typeof i.lng!=='number')return;
      if(!cities[i.location])cities[i.location]={cnt:0,lat:i.lat,lng:i.lng,minPrice:i.price};
      cities[i.location].cnt++;
      if(i.price<cities[i.location].minPrice)cities[i.location].minPrice=i.price;
    });
    Object.entries(cities).forEach(([name,d])=>{
      const short=name.replace(/\s\d+\w?$/,'');
      const icon=window.L.divIcon({
        className:'',
        html:`<div class="map-pin">📍 ${d.cnt} · ${short}</div>`,
        iconSize:[0,0],iconAnchor:[0,16]
      });
      const popup=window.L.popup({maxWidth:200,closeButton:true,className:'map-popup-wrap'}).setContent(
        `<div style="font-family:'DM Sans',system-ui;padding:6px 2px;min-width:140px">
          <div style="font-size:14px;font-weight:700;margin-bottom:4px">📍 ${short}</div>
          <div style="font-size:12px;color:#6B7280">${d.cnt} annonce${d.cnt>1?'s':''} disponible${d.cnt>1?'s':''}</div>
          <div style="font-size:13px;font-weight:600;color:#0D9488;margin-top:4px">À partir de ${d.minPrice}€<span style="font-weight:400;color:#9CA3AF">/jour</span></div>
        </div>`
      );
      const m=window.L.marker([d.lat,d.lng],{icon}).bindPopup(popup);
      m.on('click',()=>{
        setSel(name);
        setDrawerOpen(true);
      });
      mg.addLayer(m);
    });
  };

  /* ---- Init Leaflet (once on mount) ---- */
  useEffect(()=>{
    if(!window.L)return console.warn('[MapPage] Leaflet not loaded');
    if(!mapRef.current)return;
    if(leafRef.current)return;

    const map=window.L.map(mapRef.current,{zoomControl:true,attributionControl:true}).setView([46.8,2.5],6);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://openstreetmap.org/copyright">OSM</a>',
      maxZoom:19
    }).addTo(map);
    const mg=window.L.layerGroup().addTo(map);
    mgRef.current=mg;
    leafRef.current=map;

    // Capture stable refs for event handlers (avoid stale closures)
    rebuildRef.current=(src)=>buildMarkers(map,mg,src);

    const getSrc=()=>{
      const cat=mapCatRef.current;
      return cat==='all'?itemsRef.current:itemsRef.current.filter(i=>i.cat===cat);
    };

    // Initial render — delay filter until map tiles settle
    const initSrc=getSrc();
    buildMarkers(map,mg,initSrc);
    setTimeout(()=>{
      map.invalidateSize();
      setAreaItems(filterByBounds(map,initSrc));
    },200);

    // Both moveend and zoomend → instant list update + reset city selection
    // Note: Leaflet always fires moveend AFTER zoomend, so using both is intentional.
    // zoomend fires first (rebuilds markers+filters), then moveend fires again
    // with the same data — a no-op in practice since getSrc() and bounds are stable.
    // Close popup at zoom START (before animation) so it never survives the transition
    map.on('zoomstart',()=>map.closePopup());

    const onMapChange=()=>{
      map.closePopup();          // belt-and-suspenders: also close on zoomend/moveend
      map.invalidateSize();      // fix grey tiles when container size is recalculated
      const s=getSrc();
      buildMarkers(map,mg,s);
      setAreaItems(filterByBounds(map,s));
      setSel(null);
    };
    map.on('moveend',onMapChange);
    map.on('zoomend',onMapChange);

    return()=>{
      map.remove();
      leafRef.current=null;
      mgRef.current=null;
      rebuildRef.current=null;
    };
  },[]);/* eslint-disable-line react-hooks/exhaustive-deps */

  /* ---- React to category filter changes ---- */
  useEffect(()=>{
    mapCatRef.current=mapCat;
    if(!leafRef.current||!rebuildRef.current)return;
    const src=mapCat==='all'?items:items.filter(i=>i.cat===mapCat);
    rebuildRef.current(src);
    setAreaItems(filterByBounds(leafRef.current,src));
    setSel(null);
    setDrawerOpen(false);
  },[mapCat]);/* eslint-disable-line react-hooks/exhaustive-deps */

  const panelItems=sel?areaItems.filter(i=>i.location===sel):areaItems;
  const closeDrawer=()=>{setSel(null);setDrawerOpen(false);};

  return <div className="map-w">
    {/* Category filter bar */}
    <div className="map-filters">
      {CATS.slice(0,10).map(c=><button key={c.id} className={"pill"+(mapCat===c.id?" on":"")} style={{fontSize:11,whiteSpace:"nowrap",flexShrink:0}} onClick={()=>setMapCat(c.id)}>{c.icon} {c.label}</button>)}
    </div>
    <div className="map-layout">
      {/* Map area */}
      <div style={{position:"relative",minHeight:0}}>
        <div ref={mapRef} style={{position:"absolute",inset:0}}/>
        <button className="map-list-btn" style={{zIndex:1000}} onClick={()=>setDrawerOpen(d=>!d)}>
          📋 {areaItems.length} annonce{areaItems.length!==1?"s":""}
        </button>
      </div>
      {/* Side panel (desktop) / Bottom drawer (mobile) */}
      <div className={"map-side"+(drawerOpen?" open":"")}>
        <div className="map-drawer-handle" onClick={closeDrawer}/>
        <div className="map-side-hd">
          <span>{areaItems.length} annonce{areaItems.length!==1?"s":""} dans cette zone</span>
          <button className="map-drawer-close" onClick={closeDrawer}>✕</button>
        </div>
        {/* Breadcrumb ville sélectionnée */}
        {sel&&<div className="map-breadcrumb">
          <span className="map-breadcrumb-label">📍 {sel} · {panelItems.length} annonce{panelItems.length!==1?"s":""}</span>
          <button className="map-breadcrumb-reset" onClick={()=>setSel(null)}>✕ Tout voir</button>
        </div>}
        {panelItems.length===0
          ?<div style={{padding:32,textAlign:"center",color:"var(--g)"}}><div style={{fontSize:32}}>🗺️</div><p style={{fontSize:12,marginTop:8}}>Aucune annonce dans cette zone</p></div>
          :<div style={{overflowY:"auto",flex:1,paddingBottom:8}}>
            {panelItems.map(i=><div key={i.id} className="map-card" onClick={()=>onOpen(i)}>
              <img src={i.images[0]} alt={i.title}/>
              <div className="map-card-body">
                <div className="map-card-title">{i.title}</div>
                <div className="map-card-meta">📍 {i.location.replace(/\s\d+\w?$/,'')} · ★ {i.rating} ({i.reviews})</div>
                <div style={{display:"flex",alignItems:"baseline",gap:4,marginTop:2}}>
                  <span className="map-card-price">{i.price}€<span>/jour</span></span>
                  {i.condition&&<span style={{fontSize:10,background:"var(--bgw)",border:"1px solid var(--bd)",borderRadius:4,padding:"1px 5px",color:"var(--g)",fontWeight:500}}>{i.condition}</span>}
                </div>
              </div>
            </div>)}
          </div>}
      </div>
    </div>
  </div>;
}

                  <span style="font-size:10px;font-weight:700;color:${k.color};background:${k.lightBg};padding:3px 9px;border-radius:20px;">${k.sub}</span>
                </div>
                <div style="font-size:28px;font-weight:800;color:#111827;letter-spacing:-0.5px;line-height:1;">${k.val}</div>
                <div style="font-size:12px;color:#6b7280;margin-top:5px;">${k.label}</div>
              </div>`).join("")}
          </div>
        </div>
        <!-- Monthly revenue table -->
        <div style="padding:4px 40px 32px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1.2px;">Revenus mensuels — ${currentYear}</div>
            <span style="background:#6C63FF;color:white;border-radius:20px;padding:4px 16px;font-size:11px;font-weight:700;">Total ${currentYear} : ${totalAnnuel}€</span>
          </div>
          <div style="background:#ffffff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,0.07);border:1px solid rgba(0,0,0,0.05);overflow:hidden;">
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;">
              ${monthlyVals.map((v,i)=>{
                const isCur=i===curMonth;
                const barH=monthlyVals.length?Math.max(4,Math.round(v/Math.max(...monthlyVals,1)*48)):4;
                return`<div style="padding:14px 8px 12px;text-align:center;border-right:${i%6===5?"none":"1px solid #f3f4f6"};border-bottom:${i<6?"1px solid #f3f4f6":"none"};background:${isCur?"#f5f3ff":"#ffffff"};">
                  <div style="font-size:9px;font-weight:${isCur?700:500};color:${isCur?"#6C63FF":"#9ca3af"};margin-bottom:6px;">${months[i]}</div>
                  <div style="height:48px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:6px;">
                    <div style="width:20px;height:${barH}px;background:${isCur?"#6C63FF":v>0?"rgba(108,99,255,0.35)":"rgba(108,99,255,0.1)"};border-radius:4px 4px 0 0;"></div>
                  </div>
                  <div style="font-size:11px;font-weight:${isCur?700:600};color:${isCur?"#6C63FF":"#374151"};">${v}€</div>
                </div>`;
              }).join("")}
            </div>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#f3f0ff;border-top:2px solid #e0d9ff;">
              <div style="grid-column:1/5;padding:10px 16px;font-size:11px;font-weight:700;color:#6C63FF;">Total annuel</div>
              <div style="grid-column:5/7;padding:10px 16px;text-align:right;font-size:13px;font-weight:800;color:#6C63FF;">${totalAnnuel}€</div>
            </div>
          </div>
        </div>
        <!-- Footer -->
        <div style="padding:0 40px 32px;text-align:center;">
          <div style="border-top:1px solid #f3f4f6;padding-top:18px;font-size:10px;color:#d1d5db;letter-spacing:0.5px;">
            Généré le ${now} &nbsp;•&nbsp; Cercle — Location entre voisins
          </div>
        </div>
      </div>`;
    document.body.appendChild(wrapper);
    try{
      const canvas=await window.html2canvas(wrapper.firstElementChild,{scale:2,useCORS:true,backgroundColor:"#ffffff",logging:false});
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"px",format:"a4",hotfixes:["px_scaling"]});
      const pageW=doc.internal.pageSize.getWidth();
      const pageH=doc.internal.pageSize.getHeight();
      const imgW=pageW;
      const imgH=(canvas.height*pageW)/canvas.width;
      let y=0;
      if(imgH<=pageH){
        doc.addImage(canvas.toDataURL("image/png"),"PNG",0,0,imgW,imgH);
      }else{
        // multi-page if content is taller than one page
        let remaining=imgH;
        while(remaining>0){
          const sliceH=Math.min(remaining,pageH);
          const sliceCanvas=document.createElement("canvas");
          sliceCanvas.width=canvas.width;
          sliceCanvas.height=Math.round(sliceH*(canvas.height/imgH));
          const ctx=sliceCanvas.getContext("2d");
          ctx.drawImage(canvas,0,-Math.round(y*(canvas.height/imgH)));
          doc.addImage(sliceCanvas.toDataURL("image/png"),"PNG",0,0,imgW,sliceH);
          remaining-=sliceH;y+=sliceH;
          if(remaining>0)doc.addPage();
        }
      }
      doc.save(`cercle-dashboard-${now.replace(/\//g,"-")}.pdf`);
    }catch(e){
      console.error("PDF export error:",e);
      alert("Erreur lors de l'export PDF.");
    }finally{
      document.body.removeChild(wrapper);
    }
  };
  const kpis=[
    {icon:"💰",val:revenue+"€",label:"Revenus",sub:"confirmés",color:"#6C63FF",bg:"linear-gradient(135deg,#ede9fe,#ddd6fe)"},

        <button onClick={()=>setPage("home")} style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:20,padding:"6px 14px",color:"white",fontSize:13,fontWeight:600,marginBottom:20,cursor:"pointer",backdropFilter:"blur(8px)"}}>
          <I.Back/> Retour
        </button>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",fontWeight:500,marginBottom:6,textTransform:"uppercase",letterSpacing:1,animation:"fadeSlideIn 0.5s both"}}>Tableau de bord</div>
            <h1 style={{fontSize:28,fontWeight:800,color:"white",margin:0,letterSpacing:-0.5,lineHeight:1.1,animation:"fadeSlideIn 0.5s 0.08s both"}}>Bonjour {u.name.split(" ")[0]} 👋</h1>
            <p style={{fontSize:13,color:"rgba(255,255,255,0.6)",margin:"8px 0 0"}}>
              {totalYear>0?`${totalYear}€ générés cette année · `:""}
              {myItems.length} annonce{myItems.length!==1?"s":""} en ligne
            </p>
          </div>
          <button onClick={exportPDF} style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:12,padding:"9px 16px",color:"white",fontSize:12,fontWeight:600,cursor:"pointer",backdropFilter:"blur(8px)"}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:13,height:13}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PDF
          </button>
        </div>
      </div>
    </div>

    <div style={{maxWidth:860,margin:"0 auto",padding:"0 14px",display:"flex",flexDirection:"column",gap:14}}>

      {/* ── PRO EXTRA KPIs ── */}
      {u.isPro&&<div style={{...card,padding:'16px 18px',background:'linear-gradient(135deg,#FFFBEB,#FEF3C7)',border:'1.5px solid #FDE68A'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
          <span style={{background:'linear-gradient(135deg,#F59E0B,#D97706)',color:'#fff',fontSize:10,fontWeight:800,padding:'3px 10px',borderRadius:20,letterSpacing:'.04em'}}>⭐ PRO</span>
          <div style={{fontSize:13,fontWeight:700,color:'#92400E'}}>Indicateurs Professionnels</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {[
            {icon:'💛',val:monthlyVals[curMonth]+'€',label:'CA mensuel',sub:months[curMonth],col:'#D97706'},
            {icon:'🔄',val:myBookAsOwner.filter(b=>b.status==='confirmed').length,label:'Locations actives',sub:'confirmées',col:'#059669'},
            {icon:'📊',val:myItems.length>0?Math.min(100,Math.round(myBookAsOwner.filter(b=>b.status==='confirmed').length/Math.max(myItems.length,1)*100))+'%':'—',label:"Taux d'occupation",sub:'du parc',col:'#6C63FF'},
            {icon:'⭐',val:myItems.length>0&&myItems.some(i=>i.rating>0)?(myItems.reduce((s,i)=>s+i.rating,0)/myItems.length).toFixed(1):'–',label:'Note moyenne',sub:'locataires',col:'#D97706'},
          ].map((k,i)=>(
            <div key={i} style={{textAlign:'center',padding:'10px 6px',background:'rgba(255,255,255,0.6)',borderRadius:12}}>
              <div style={{fontSize:20,marginBottom:4}}>{k.icon}</div>
              <div style={{fontSize:18,fontWeight:800,color:k.col,lineHeight:1,letterSpacing:-.5}}>{k.val}</div>
              <div style={{fontSize:10,fontWeight:600,color:'#92400E',marginTop:3}}>{k.label}</div>
              <div style={{fontSize:9,color:'#B45309',marginTop:1}}>{k.sub}</div>
            </div>
          ))}
        </div>
      </div>}

      {/* ── KPIs ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
        {kpis.map((k,i)=>(
          <div key={i} style={{...card,padding:"16px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{width:40,height:40,borderRadius:12,background:k.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>{k.icon}</div>
              <span style={{fontSize:10,fontWeight:700,color:k.color,background:k.bg,padding:"3px 8px",borderRadius:20}}>{k.sub}</span>
            </div>
            <div style={{fontSize:26,fontWeight:800,color:"var(--dk)",letterSpacing:-0.5,lineHeight:1}}>{k.val}</div>
            <div style={{fontSize:12,color:"var(--g)",marginTop:4}}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* ── Revenue chart ── */}
      <div style={{...card,padding:"18px 16px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"var(--dk)"}}>Revenus & activité</div>
            <div style={{fontSize:11,color:"var(--g)",marginTop:2}}>{new Date().getFullYear()} · {hasReal?"données réelles":"données de démonstration"}</div>
            <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
              {[{m:"monthly",label:"Par mois",icon:"📅"},{m:"revenue",label:"Revenus/catégorie",icon:"💰"},{m:"count",label:"Locations/catégorie",icon:"📦"}].map(({m,label,icon})=>(
                <button key={m} onClick={()=>toggleMetric(m)} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,border:"1.5px solid",fontSize:10,fontWeight:600,cursor:"pointer",transition:"all 0.2s ease",outline:"none",borderColor:chartMetrics.includes(m)?"#6C63FF":dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.12)",background:chartMetrics.includes(m)?"#6C63FF":"transparent",color:chartMetrics.includes(m)?"#fff":dark?"#a0a0b8":"#6b7280"}}>
                  <span style={{fontSize:10}}>{icon}</span>{label}
                </button>
              ))}
            </div>
            {chartMetrics.includes('monthly')&&(
              <div style={{display:"flex",gap:4,marginTop:6}}>
                {[{t:"bar",label:"Barres",icon:"▬"},{t:"line",label:"Courbe",icon:"〜"}].map(({t,label,icon})=>(
                  <button key={t} onClick={()=>setChartType(t)} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,border:"1.5px solid",fontSize:10,fontWeight:600,cursor:"pointer",transition:"all 0.2s ease",outline:"none",borderColor:chartType===t?"#6C63FF":dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.12)",background:chartType===t?"rgba(108,99,255,0.15)":"transparent",color:chartType===t?"#6C63FF":dark?"#a0a0b8":"#6b7280"}}>
                    <span style={{fontSize:11}}>{icon}</span>{label}
                  </button>
                ))}
              </div>
            )}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:18,fontWeight:800,color:"#6C63FF",letterSpacing:-0.5}}>{monthlyVals[curMonth]}€</div>
            <div style={{fontSize:10,color:"var(--g)"}}>ce mois</div>
          </div>
        </div>
        {window.Chart
          ? <div style={{height:170,position:"relative"}}><canvas ref={barRef}/></div>

              {monthlyVals.map((v,i)=>(
                <div key={i} title={months[i]+": "+v+"€"} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>

                    background:i===curMonth?"#6C63FF":i<curMonth?"rgba(108,99,255,0.4)":"rgba(108,99,255,0.12)",
                    height:Math.max(3,Math.round(v/maxVal*140))}}/>
                  <div style={{fontSize:7,color:i===curMonth?"#6C63FF":"#9ca3af",fontWeight:i===curMonth?700:400}}>{months[i].slice(0,1)}</div>
                </div>

        }
      </div>

      {/* ── Category chart + Quick actions ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}} className="dboard-grid">

          {catData.length>0&&window.Chart
            ? <div style={{height:150,position:"relative"}}><canvas ref={pieRef}/></div>
            : catData.length===0
              ? <div style={{height:140,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,color:"var(--g)"}}>
                  <span style={{fontSize:28}}>📦</span><span style={{fontSize:12}}>Aucune annonce</span>

              : <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {catData.slice(0,5).map(([cat,cnt],i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:chartColors[i%8],flexShrink:0}}/>
                      <div style={{flex:1,fontSize:11,color:"var(--dk)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat}</div>
                      <div style={{width:50,height:5,background:"var(--bgw)",borderRadius:3,overflow:"hidden"}}>
                        <div style={{width:Math.round(cnt/myItems.length*100)+"%",height:"100%",background:chartColors[i%8],borderRadius:3}}/>
                      </div>
                      <div style={{fontSize:11,fontWeight:700,color:"var(--dk)",minWidth:14,textAlign:"right"}}>{cnt}</div>
                    </div>
                  ))}
                </div>
          }
        </div>
        <div style={{...card,padding:"18px 16px"}}>
          <div style={{fontSize:14,fontWeight:700,color:"var(--dk)",marginBottom:14}}>Actions rapides</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[
              {icon:"➕",label:"Nouvelle annonce",color:"#6C63FF",bg:"#ede9fe",action:()=>setPage("create")},
              {icon:"📅",label:"Réservations",color:"#0ea5e9",bg:"#e0f2fe",action:()=>setPage("profile")},
              {icon:"🆔",label:"Vérifier identité",color:"#10b981",bg:"#d1fae5",action:()=>setPage("verify")},
            ].map((a,i)=>(
              <button key={i} onClick={a.action} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:"none",borderRadius:12,background:a.bg,cursor:"pointer",textAlign:"left",transition:"opacity .15s"}}
                onMouseEnter={e=>e.currentTarget.style.opacity=".8"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                <span style={{fontSize:16}}>{a.icon}</span>
                <span style={{fontSize:12,fontWeight:600,color:a.color}}>{a.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── Listings ── */}
      <div style={{...card,padding:"18px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:"var(--dk)"}}>Mes annonces</div>
          <button onClick={()=>setPage("create")} style={{fontSize:12,fontWeight:600,color:"#6C63FF",background:"#ede9fe",border:"none",borderRadius:20,padding:"5px 12px",cursor:"pointer"}}>+ Ajouter</button>
        </div>
        {myItems.length===0
          ? <div style={{textAlign:"center",padding:"24px 0",color:"var(--g)"}}>
              <div style={{fontSize:28,marginBottom:6}}>📦</div>
              <div style={{fontSize:13,fontWeight:600,color:"var(--dk)",marginBottom:4}}>Aucune annonce</div>
              <button className="bp" style={{marginTop:10,fontSize:12,padding:"7px 18px"}} onClick={()=>setPage("create")}>Créer une annonce</button>
            </div>
          : <div style={{display:"flex",flexDirection:"column"}}>
              {myItems.slice(0,6).map((it,idx)=>(
                <div key={it.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:idx<Math.min(myItems.length,6)-1?"1px solid var(--bd)":"none",animation:`fadeSlideUp 0.4s ${0.55+idx*0.05}s both`}}>
                  <img src={it.images[0]} alt="" style={{width:42,height:34,objectFit:"cover",borderRadius:8,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--dk)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.title}</div>
                    <div style={{fontSize:11,color:"var(--g)",marginTop:1}}>{it.price}€/j · {it.cat}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
                    <button onClick={()=>dispatch({type:"TOGGLE_AVAIL",id:it.id})} style={{fontSize:11,fontWeight:700,padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",
                      background:it.available?"#d1fae5":"#f3f4f6",color:it.available?"#065f46":"#6b7280"}}>
                      {it.available?"✓ Dispo":"Indispo"}
                    </button>
                    <button onClick={()=>setQrItem(it)} style={{fontSize:10,fontWeight:700,padding:"4px 8px",borderRadius:20,border:"1.5px solid #d1c9ff",background:"#f5f3ff",color:"#6C63FF",cursor:"pointer"}}>📱 QR</button>
                  </div>
                </div>
              ))}
            </div>
        }
      </div>
      {qrItem&&<QRModal item={qrItem} onClose={()=>setQrItem(null)}/>}

    </div>
  </div>
  );
}

/* ===== REFERRAL ===== */
function ReferralPage({state,dispatch,setPage}){
  const[copied,setCopied]=useState(false);const[friendName,setFriendName]=useState("");
  const code=state.user?.refCode||"CERCLE";
  const totalBonus=state.referrals.reduce((s,r)=>s+r.bonus,0);
  const copy=()=>{navigator.clipboard?.writeText(code).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),2000)};
  const invite=()=>{if(!friendName)return;dispatch({type:"REFERRAL",name:friendName});setFriendName("")};
  return <div style={{maxWidth:540,margin:"0 auto",padding:28}}>
    <button className="cl" style={{marginBottom:14,display:"flex",alignItems:"center",gap:5}} onClick={()=>setPage("home")}><I.Back/> Retour</button>
    <h1 style={{fontFamily:"var(--fd)",fontSize:22,marginBottom:6}}>⭐ Parrainage</h1>
    <p style={{fontSize:13,color:"var(--g)",marginBottom:16}}>Invitez vos amis et gagnez 5€ de crédit par filleul inscrit !</p>
    <div style={{background:"linear-gradient(135deg,#FEF3C7,#FFFBEB)",borderRadius:14,padding:20,textAlign:"center",marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>VOTRE CODE PARRAIN</div>
      <div style={{fontFamily:"var(--fd)",fontSize:32,fontWeight:700,letterSpacing:4,marginBottom:8}}>{code}</div>
      <button className="bp" style={{fontSize:12,padding:"8px 20px"}} onClick={copy}>{copied?"✓ Copié !":"📋 Copier le code"}</button>

      <div style={{fontSize:11,color:"var(--g)",marginTop:2}}>{ds(d.date)}{d.desc&&" · "+d.desc}</div>

/* ===== CHATBOT ===== */
function Chatbot({items,onOpen,onClose}){
  const[msgs,setMsgs]=useState([{from:"bot",text:"Bonjour ! 👋 Je suis l'assistant Cercle.\n\nDites-moi ce que vous cherchez à louer !\n\nExemples :\n• \"perceuse\" ou \"bricolage\"\n• \"vélo\" ou \"transport\"\n• \"fête\" ou \"anniversaire\"\n• \"prix\" pour les moins chers\n• \"aide\" pour comprendre le fonctionnement"}]);
  const[input,setInput]=useState("");const ref=useRef(null);
  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight)},[msgs.length]);
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const KW={tools:["bricolage","perceuse","visseuse","ponceuse","echelle","nettoyeur","karcher","outil","percer","poncer","scie","tournevis","marteau","cle","compresseur","meuleuse"],electronics:["electronique","drone","console","ps5","xbox","projecteur","videoprojecteur","enceinte","jbl","bluetooth","tv","ecran","son","haut-parleur","camera"],vehicles:["vehicule","voiture","camion","camionnette","velo","trottinette","scooter","remorque","transport","utilitaire","fourgon","moto"],sports:["sport","paddle","ski","kayak","vtt","velo","surf","planche","raquette","fitness","musculation","boxe","randonnee","escalade"],garden:["jardin","tondeuse","taille-haie","taille haie","motoculteur","arrosage","plante","herbe","pelouse","haie","debroussailleuse","souffleur"],events:["evenement","fete","mariage","anniversaire","chaise","tonnelle","barbe a papa","sono","dj","decoration","party","bapteme","reception"],music:["musique","guitare","piano","platine","dj","instrument","clavier","batterie","micro","ampli","synthetiseur"],gaming:["jeu","gaming","console","casque vr","meta quest","volant","manette","ps5","xbox","nintendo","playstation","jeux video"],baby:["bebe","poussette","siege auto","enfant","landau","berceau","biberon","puericulture"],fashion:["mode","robe","costume","vetement","habit","sezane","hugo boss","tenue","smoking"],camping:["camping","tente","glaciere","sac de couchage","randonnee","bivouac","plein air","hamac","rechaud"],kitchen:["cuisine","robot","kitchenaid","raclette","fondue","patissier","mixer","blender","thermomix","plancha"],photo:["photo","appareil","camera","canon","stabilisateur","trepied","objectif","reflex","video","gopro","nikon","sony"],diy:["creatif","couture","coudre","imprimante 3d","singer","machine","impression","diy","art","broder"]};
  const findItems=(q)=>{
    const words=norm(q).split(/\s+/).filter(w=>w.length>1);
    if(words.length===0)return[];
    let scored=items.map(item=>{let score=0;const t=norm(item.title);const d=norm(item.description||"");const c=item.cat;
      words.forEach(w=>{
        if(t.includes(w))score+=10;
        if(w.length>=3&&t.split(/\s+/).some(tw=>tw.startsWith(w)||w.startsWith(tw)))score+=6;
        if(d.includes(w))score+=3;
        if(c.includes(w))score+=5;
        Object.entries(KW).forEach(([cat,kws])=>{if(kws.some(k=>k.includes(w)||w.includes(k)||(w.length>=3&&k.startsWith(w)))){if(item.cat===cat)score+=8}})
      });
      return{item,score}}).filter(s=>s.score>0).sort((a,b)=>b.score-a.score);
    return scored.slice(0,4).map(s=>s.item);
  };
  const getCatFromQ=(q)=>{const ql=norm(q);let best=null,bestN=0;Object.entries(KW).forEach(([cat,kws])=>{const n=kws.filter(k=>ql.includes(k)||(k.length>=3&&ql.split(/\s+/).some(w=>k.includes(w)||w.includes(k)))).length;if(n>bestN){bestN=n;best=cat}});return best};
  const send=()=>{if(!input.trim())return;const q=input.trim();const ql=norm(q);setMsgs(p=>[...p,{from:"user",text:q}]);setInput("");
    setTimeout(()=>{
      if(["bonjour","salut","hello","hi","hey","coucou","yo"].some(g=>ql.includes(g))){setMsgs(p=>[...p,{from:"bot",text:"Bonjour ! 😊 Comment puis-je vous aider ?\n\nDites-moi ce que vous voulez louer, par exemple :\n\"perceuse\", \"vélo\", \"sono pour une fête\"..."}]);return}
      if(["merci","thanks","super","genial","parfait","cool"].some(g=>ql.includes(g))){setMsgs(p=>[...p,{from:"bot",text:"Avec plaisir ! 😊 N'hésitez pas si vous avez d'autres questions."}]);return}
      if(["prix","combien","budget","cher","pas cher","moins cher","economique","cheap"].some(g=>ql.includes(g))){const sorted=[...items].sort((a,b)=>a.price-b.price);setMsgs(p=>[...p,{from:"bot",text:`💰 Les prix vont de ${sorted[0]?.price}€ à ${sorted[sorted.length-1]?.price}€ par jour.\n\nVoici les plus abordables :`,items:sorted.slice(0,4)}]);return}
      if(["caution","depot","garantie","remboursement","rembourse"].some(g=>ql.includes(g))){setMsgs(p=>[...p,{from:"bot",text:"🔒 Caution\n\nLa caution est bloquée lors de la réservation et restituée sous 48h après le retour de l'objet en bon état.\n\nLe propriétaire la libère depuis son espace."}]);return}
      if(["aide","comment","fonctionn","utiliser","marche","expliqu"].some(g=>ql.includes(g))){setMsgs(p=>[...p,{from:"bot",text:"📖 Comment ça marche ?\n\n1️⃣ Trouvez un objet à louer\n2️⃣ Réservez et payez en ligne (paiement sécurisé)\n3️⃣ Récupérez l'objet chez le propriétaire\n4️⃣ Profitez-en pendant la durée !\n5️⃣ Rendez-le → caution restituée 🎉\n\nBesoin d'autre chose ?"}]);return}
      if(["populaire","tendance","top","meilleur","mieux note"].some(g=>ql.includes(g))){const top=[...items].sort((a,b)=>b.rating-a.rating).slice(0,4);setMsgs(p=>[...p,{from:"bot",text:"🔥 Top annonces les mieux notées :",items:top}]);return}
      if(["nouveau","recent","dernier","neuf"].some(g=>ql.includes(g))){const recent=items.filter(i=>i.condition==="Comme neuf").slice(0,4);setMsgs(p=>[...p,{from:"bot",text:"✨ Objets en état \"Comme neuf\" :",items:recent.length>0?recent:items.slice(0,4)}]);return}
      const found=findItems(q);
      if(found.length>0){setMsgs(p=>[...p,{from:"bot",text:`J'ai trouvé ${found.length} résultat${found.length>1?"s":""} pour "${q}" 🎯`,items:found}])}
      else{const cat=getCatFromQ(q);
        if(cat){const catItems=items.filter(i=>i.cat===cat).slice(0,4);if(catItems.length>0){setMsgs(p=>[...p,{from:"bot",text:`Dans la catégorie ${CATS.find(c=>c.id===cat)?.label||cat} :`,items:catItems}])}else{setMsgs(p=>[...p,{from:"bot",text:`Hmm, rien trouvé dans cette catégorie. Essayez d'autres mots-clés !`}])}}
        else{const suggestions=items.sort(()=>Math.random()-.5).slice(0,3);setMsgs(p=>[...p,{from:"bot",text:`Je n'ai pas trouvé de résultat pour "${q}" 😅\n\nEssayez avec :\n• Un nom d'objet : perceuse, vélo, drone\n• Une catégorie : bricolage, sport, musique\n• Un mot-clé : fête, photo, camping\n\nVoici quelques suggestions :`,items:suggestions}])}}
    },400+Math.random()*200)};
  return <div className="chatbot-w">
    <div className="chatbot-hd"><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>🤖</span><div><div style={{fontWeight:700,fontSize:14}}>Assistant Cercle</div><div style={{fontSize:10,opacity:.8}}>En ligne · Réponse instantanée</div></div></div><button style={{background:"none",border:"none",color:"#fff",fontSize:18,cursor:"pointer"}} onClick={onClose}>✕</button></div>
    <div className="chatbot-bd" ref={ref}>{msgs.map((m,i)=><div key={i}><div className={"chatbot-msg "+(m.from)} style={{whiteSpace:"pre-line"}}>{m.text}</div>
      {m.items&&<div style={{display:"flex",flexDirection:"column",gap:4,marginTop:6}}>{m.items.map(it=><div key={it.id} style={{display:"flex",gap:8,padding:8,background:"var(--bg)",borderRadius:12,cursor:"pointer",fontSize:12,transition:"all .15s",border:"1px solid var(--bd)"}} onClick={()=>onOpen(it)} onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.02)";e.currentTarget.style.borderColor="var(--p)"}} onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.borderColor="var(--bd)"}}><img src={it.images[0]} alt="" style={{width:48,height:36,objectFit:"cover",borderRadius:8,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.title}</div><div style={{display:"flex",justifyContent:"space-between",marginTop:2}}><span style={{color:"var(--p)",fontWeight:700}}>{it.price}€/j</span><span style={{color:"var(--g)"}}>★ {it.rating}</span></div></div></div>)}</div>}
    </div>)}</div>
    <div className="chatbot-ft"><input value={input} onChange={e=>setInput(e.target.value)} placeholder="Que cherchez-vous à louer ?" onKeyDown={e=>e.key==="Enter"&&send()}/><button onClick={send}><I.Send/></button></div>
  </div>
}

}


/* ===== CONFIRMATION REMISE/RETOUR ===== */
function ConfirmDeliveryPage({annonceId, allItems, onBack}){
  const item=allItems.find(i=>String(i.id)===String(annonceId));
  const[confirmed,setConfirmed]=useState(null);
  const[ts,setTs]=useState('');
  const confirm=(type)=>{
    const now=new Date().toLocaleString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    setConfirmed(type);setTs(now);
  };
  if(confirmed){return(
    <div style={{maxWidth:480,margin:'0 auto',padding:'60px 28px',textAlign:'center',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{fontSize:72,marginBottom:16}}>✅</div>
      <h2 style={{fontFamily:'var(--fd)',fontSize:22,marginBottom:8}}>Confirmation enregistrée</h2>
      <p style={{fontSize:14,color:'var(--g)',lineHeight:1.6,marginBottom:16}}>
        {confirmed==='received'?<>Vous avez confirmé avoir <strong>reçu</strong> l'objet.</>:<>Vous avez confirmé avoir <strong>récupéré</strong> l'objet.</>}
      </p>
      <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:12,padding:'14px 20px',fontSize:13,color:'#166534',marginBottom:24,width:'100%'}}>
        🕐 Horodatage : <strong>{ts}</strong>
      </div>
      <p style={{fontSize:12,color:'var(--gl)'}}>Cette confirmation peut servir de preuve en cas de litige.</p>
      <button className="bs" style={{marginTop:20}} onClick={onBack}>← Retour à l'accueil</button>
    </div>
  );}
  return(
    <div style={{maxWidth:480,margin:'0 auto',padding:'60px 28px',textAlign:'center',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{fontSize:52,marginBottom:16}}>📦</div>
      <h2 style={{fontFamily:'var(--fd)',fontSize:22,marginBottom:6}}>{item?item.title:'Annonce #'+annonceId}</h2>
      <p style={{fontSize:14,color:'var(--g)',marginBottom:28,lineHeight:1.6}}>Confirmez la remise ou le retour de cet objet pour protéger les deux parties.</p>
      <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%'}}>
        <button className="bp" style={{width:'100%',padding:'16px',fontSize:15}} onClick={()=>confirm('received')}>
          ✅ Je confirme avoir reçu l'objet
        </button>
        <button className="bs" style={{width:'100%',padding:'16px',fontSize:15}} onClick={()=>confirm('returned')}>
          ✅ Je confirme avoir récupéré l'objet
        </button>
      </div>
      <button className="cl" style={{marginTop:20}} onClick={onBack}>← Retour</button>
    </div>
  );
}
